[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-x -q --tb=short --strict-markers"
pythonpath = ["."]
markers = [
    "unit: Unit tests with no external dependencies",
    "integration: Tests requiring PostgreSQL or Redis",
    "gpu: Tests requiring CUDA GPU access",
    "audit_item(item_id): Bind a test to a §13 audit checklist item",
]
filterwarnings = [
    # spacy 3.7.x imports a click internal path that click 8.3 deprecated
    # for click 9.0. We pin spacy==3.7.x per §10.2 and cannot upgrade
    # until a spec amendment. Scope the filter to the spacy module so
    # real DeprecationWarnings elsewhere still surface.
    "ignore:Importing 'parser.split_arg_string' is deprecated:DeprecationWarning:spacy",
]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = false
disallow_untyped_decorators = false
plugins = ["pydantic.mypy"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "ANN", "B", "SIM"]
ignore = ["ANN401"]

[tool.ruff.lint.isort]
known-first-party = ["packages", "services"]

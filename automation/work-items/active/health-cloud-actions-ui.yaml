  - "docs/artifacts/OPERATOR_CONSOLE_UI_UX_AUDIT.md"
  - "services/operator_console/design_system/DESIGN_SYSTEM.md"
  - "services/operator_console/design_system/design_system.json"
  - "automation/schemas/ux_plan.py"
ux_plan: "automation/work-items/active/health-cloud-actions-ux.json"
target_files:
  - "services/operator_console/views/health_view.py"
  - "services/operator_console/viewmodels/health_vm.py"
  - "services/operator_console/views/main_window.py"
  - "services/operator_console/polling.py"
  - "services/operator_console/formatters.py"
  - "services/operator_console/design_system/design_system.json"
  - "tests/unit/operator_console/test_health_view.py"
  - "tests/unit/operator_console/test_main_window.py"
  - "tests/unit/operator_console/test_polling.py"
  - "tests/unit/operator_console/test_formatters.py"
  - "tests/unit/operator_console/test_design_system_audit.py"
  - "tests/unit/scripts/audit/test_design_system_verifier.py"
target_symbols:
  - "HealthView"
  - "HealthViewModel"
  - "MainWindow"
  - "PollingCoordinator.cloud_sign_in"
  - "PollingCoordinator.refresh_experiment_bundle"
  - "format_health_action_copy"
  - "format_health_action_error"
acceptance_criteria:
  invariants:
    - "no inline setStyleSheet calls outside services/operator_console/design_system/"
    - "no hex literals in services/operator_console/ outside design_system/tokens.py"
    - "every QSS #ObjectName selector is registered in design_system/design_system.json"
    - "status mapping uses UiStatusKind rather than ad-hoc strings"
    - "view files do not import services.operator_console.api_client"
    - "formatter helpers remain pure and Qt-free"
    - "Health header keeps the existing action surface and does not add a new route, modal workflow, or ActionBar control"
    - "header action order stays Cloud sign-in, Refresh experiments, Repair install"
    - "Refresh experiments prerequisite failure reads exactly: Cloud sign-in is required before refreshing experiments."
    - "inline action status covers progress and success; AlertBanner remains the page-scoped failure surface"
    - "run uv run python scripts/render_console_screens.py and inspect Health screenshots at narrow, medium, and wide widths before declaring delivery"
  tests:
    - "tests/unit/operator_console/test_health_view.py"
    - "tests/unit/operator_console/test_main_window.py"
    - "tests/unit/operator_console/test_polling.py"
    - "tests/unit/operator_console/test_formatters.py"
    - "tests/unit/operator_console/test_design_system_audit.py"
    - "tests/unit/scripts/audit/test_design_system_verifier.py"
ci_scope:
  - "operator_console"
  - "design_system"

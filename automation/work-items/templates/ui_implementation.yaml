source_artifacts:
  - "docs/artifacts/OPERATOR_CONSOLE_UI_UX_AUDIT.md"
  - "services/operator_console/design_system/DESIGN_SYSTEM.md"
  - "automation/schemas/ux_plan.py"
ux_plan: "automation/work-items/active/<work-item>-ux.json"
target_files:
  - "services/operator_console/views/<page>_view.py"
  - "services/operator_console/viewmodels/<page>_vm.py"

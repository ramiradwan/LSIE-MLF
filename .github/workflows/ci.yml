name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Pin lint toolchain so a mypy release doesn't turn a previously
          # green tree red without a corresponding repo change. Bumping
          # these is a deliberate PR, not a drive-by on the next run.
          pip install "ruff==0.15.*" "mypy==1.20.*"
          pip install -r requirements/base.txt
          pip install -r requirements/api.txt
          pip install pydantic numpy
          # pytest is installed here (not just in the `test` job) so that
          # mypy can see `pytest.skip()` as `NoReturn` and narrow types
          # past skip-guards in tests/ — without it, `--ignore-missing-
          # imports` makes pytest.skip return Any and narrowing breaks.
          pip install pytest
          # PySide6 ships its own type stubs. The operator console
          # (services/operator_console/) subclasses QObject/QWidget/
          # QAbstractTableModel etc. With --ignore-missing-imports these
          # base classes resolve to Any on a Qt-less runner, which mypy
          # rejects under the default disallow_subclassing_any rule. The
          # rest of cli.txt (mediapipe, opencv, etc.) is not needed for
          # type checking and is intentionally not installed here.
          pip install "PySide6>=6.7,<7.0"
      - name: Ruff lint
        run: ruff check packages/ services/ tests/
      - name: Ruff format check
        run: ruff format --check packages/ services/ tests/
      - name: Mypy type check
        run: mypy packages/ services/ tests/ --python-version 3.11 --ignore-missing-imports --explicit-package-bases

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements/base.txt
            requirements/api.txt
            requirements/worker.txt
      - name: Install Qt runtime libraries
        # PySide6's QtWidgets dynamically loads libEGL.so.1 / libGL.so.1
        # at import time, even under QT_QPA_PLATFORM=offscreen. The
        # ubuntu-latest runner does not ship these by default, so the
        # operator-console conftests (unit + integration) fail at import
        # before any test body runs. libxkbcommon / libdbus / libfontconfig
        # are additional transitive dlopen targets for QtGui / QtWidgets.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1
      - name: Install worker dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/worker.txt
          pip install -r requirements/api.txt
          pip install pytest pytest-cov
          # The operator-console tests import PySide6.QtWidgets via their
          # session-scoped qt_app fixture. PySide6 is not in
          # requirements/worker.txt (it lives in requirements/cli.txt with
          # the rest of the operator-host deps), so install just the Qt
          # binding here — mediapipe / opencv from cli.txt are not needed.
          pip install "PySide6>=6.7,<7.0"
      - name: Run tests
        env:
          # Belt-and-suspenders: conftest sets this with setdefault, but
          # pinning it at the job level keeps the intent visible in the
          # workflow and guards against a future test that imports Qt
          # before the fixture runs.
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -x -q --tb=short

  canonical-terminology-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for retired synonyms (§0.3)
        run: |
          RETIRED_TERMS="Celery node|GPU worker|inference worker|task queue|FIFO|named pipe|POSIX pipe|audio pipe|kernel pipe|24-hour vault|data vault|transient storage|secure buffer|handoff schema|payload schema|inference payload|FastAPI server|web server|ASGI server|Celery worker|scrcpy container|capture service|stream ingester|relational database"
          MATCHES=$(grep -rnE "$RETIRED_TERMS" services/ packages/ docker-compose.yml --include='*.py' --include='*.yml' --include='*.yaml' --include='*.sh' --include='*.txt' 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Retired synonyms found (§0.3 violation):"
            echo "$MATCHES"
            exit 1
          fi
          echo "✅ No retired synonyms found."

  dependency-pin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify no unpinned dependencies
        run: |
          for f in requirements/base.txt requirements/api.txt requirements/worker.txt; do
            if grep -E "^[a-zA-Z]" "$f" | grep -v -E "==|>=|~=|\*" | grep -v "^-r" | grep -v "^#"; then
              echo "❌ Unpinned dependency found in $f"
              exit 1
            fi
          done
          echo "✅ All dependencies are pinned."

  # NEW: Parallel Docker builds with layer caching
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            tag: test-api
          - service: worker
            tag: test-worker
          - service: stream_ingest
            tag: test-capture
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and cache Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          tags: ${{ matrix.tag }}:latest
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
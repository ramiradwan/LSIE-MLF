name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements/base.txt
          pip install pydantic numpy

      - name: Ruff lint
        run: ruff check packages/ services/ tests/

      - name: Ruff format check
        run: ruff format --check packages/ services/ tests/

      - name: Mypy type check (full codebase)
        run: mypy packages/ services/ tests/ --python-version 3.11 --ignore-missing-imports --explicit-package-bases

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install pydantic numpy pytest pytest-cov pycryptodome

      - name: Run tests
        run: pytest tests/ -x -q --tb=short

  canonical-terminology-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for retired synonyms (§0.3)
        run: |
          RETIRED_TERMS="Celery node|GPU worker|inference worker|task queue|FIFO|named pipe|POSIX pipe|audio pipe|kernel pipe|24-hour vault|data vault|transient storage|secure buffer|handoff schema|payload schema|inference payload|FastAPI server|web server|ASGI server|Celery worker|scrcpy container|capture service|stream ingester|relational database"
          MATCHES=$(grep -rn "$RETIRED_TERMS" services/ packages/ docker-compose.yml --include='*.py' --include='*.yml' --include='*.yaml' --include='*.sh' --include='*.txt' 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Retired synonyms found (§0.3 violation):"
            echo "$MATCHES"
            exit 1
          fi
          echo "✅ No retired synonyms found."

  docker-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create dummy .env for validation
        run: |
          echo "POSTGRES_USER=ci" >> .env
          echo "POSTGRES_PASSWORD=ci" >> .env
          echo "POSTGRES_DB=ci" >> .env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  dependency-pin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify no unpinned dependencies
        run: |
          # Check that requirements files don't contain bare package names without version constraints
          for f in requirements/base.txt requirements/api.txt requirements/worker.txt; do
            if grep -E "^[a-zA-Z]" "$f" | grep -v -E "==|>=|~=|\*" | grep -v "^-r" | grep -v "^#"; then
              echo "❌ Unpinned dependency found in $f"
              exit 1
            fi
          done
          echo "✅ All dependencies are pinned."

name: Deploy Designer Portal

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: designer-portal
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout implementation
        uses: actions/checkout@v6
        with:
          path: implementation

      - name: Read designer export ref
        id: export
        working-directory: implementation
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          manifest = json.loads(Path("services/operator_console/design_system/designer_export_manifest.json").read_text())
          export_ref = manifest["export_ref"]
          branch_commit, export_path = export_ref.split(":", 1)
          branch, commit = branch_commit.split("@", 1)
          print(f"branch={branch}")
          print(f"commit={commit}")
          print(f"path={export_path}")
          PY

      - name: Checkout designer export
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.export.outputs.commit }}
          path: designer-export

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: implementation/uv.lock

      - name: Set up Python 3.11
        working-directory: implementation
        run: uv python install 3.11

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: implementation/package-lock.json

      - name: Cache Playwright browser binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('implementation/package-lock.json') }}

      - name: Install Qt runtime libraries and FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1 ffmpeg fonts-liberation

      - name: Sync runtime + dev environment
        working-directory: implementation
        run: uv sync --frozen --group dev

      - name: Install pinned visual-drift tooling
        working-directory: implementation
        run: npm ci

      - name: Install pinned Playwright Chromium
        working-directory: implementation
        run: npx playwright install --with-deps chromium

      - name: Verify consumed designer export
        working-directory: implementation
        run: |
          uv run python scripts/generate_pyside_tokens.py \
            --export-dir ../designer-export/${{ steps.export.outputs.path }} \
            --manifest services/operator_console/design_system/designer_export_manifest.json \
            --check

      - name: Capture designer reference screenshots
        working-directory: implementation
        run: |
          node scripts/capture_html_reference.js \
            ../designer-export/${{ steps.export.outputs.path }} \
            ../captures/designer-reference

      - name: Render PySide runtime screenshots
        working-directory: implementation
        env:
          QT_QPA_PLATFORM: offscreen
          LSIE_SCREENSHOT_DIR: ../captures/runtime
        run: uv run python scripts/render_console_screens.py

      - name: Generate advisory designer-reference report
        working-directory: implementation
        run: |
          node scripts/generate_drift_report.js \
            ../captures/runtime \
            ../captures/designer-reference \
            ../captures/designer-reference-report \
            --mode designer-reference \
            --advisory \
            --allow-missing \
            --threshold 0.02

      - name: Assemble portal
        run: |
          mkdir -p portal/drift-reports/commit-${{ github.sha }} portal/captures/runtime portal/captures/designer-reference
          cp -R designer-export/${{ steps.export.outputs.path }}/reference/. portal/
          cp -R captures/designer-reference-report/. portal/drift-reports/commit-${{ github.sha }}/
          cp -R captures/runtime/. portal/captures/runtime/
          cp -R captures/designer-reference/. portal/captures/designer-reference/
          python - <<'PY'
          import os
          from pathlib import Path

          commit = os.environ["GITHUB_SHA"]
          index = Path("portal/index.html")
          report_href = f"drift-reports/commit-{commit}/runtime-drift.html"
          style = """
          <style id="automated-reports-style">
            .automated-reports {
              margin: 32px auto;
              max-width: 1120px;
              border: 1px solid rgba(255, 255, 255, 0.14);
              border-radius: 24px;
              padding: 24px;
              background: rgba(255, 255, 255, 0.06);
            }
            .automated-reports ul { margin: 16px 0; padding-left: 20px; }
            .automated-reports a { font-weight: 800; }
          </style>
          """.strip()
          section = f"""
          <section id="automated-reports" class="automated-reports">
            <p class="eyebrow">Automated Reports</p>
            <h2>Latest visual drift evidence</h2>
            <ul>
              <li><a href="{report_href}">Open the latest advisory runtime drift report</a></li>
            </ul>
            <p>Review the side-by-side synthetic runtime captures, designer-reference captures, and pixel drift masks before accepting visual changes.</p>
          </section>
          """.strip()
          text = index.read_text(encoding="utf-8")
          if 'id="automated-reports-style"' not in text:
              if "</head>" in text:
                  text = text.replace("</head>", f"{style}\n</head>")
              else:
                  section = f"{style}\n{section}"
          if 'id="automated-reports"' in text:
              start = text.index('<section id="automated-reports"')
              end = text.index('</section>', start) + len('</section>')
              text = f"{text[:start]}{section}{text[end:]}"
          else:
              text = text.replace("</body>", f"{section}\n</body>")
          index.write_text(text, encoding="utf-8")
          PY

      - name: Summarize Designer Portal
        shell: bash
        run: |
          PORTAL_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          {
            echo "## Designer Portal"
            echo
            echo "[🚪 Open the Designer Portal]($PORTAL_URL)"
            echo
            echo "Check the 'Automated Reports' section on the portal homepage for the latest visual drift results."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portal
          retention-days: 14

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

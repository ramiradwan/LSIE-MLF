version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/services/api"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/worker"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/stream_ingest"
    schedule:
      interval: "monthly"

  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
    # §10.2 — All upgrades require manual review against spec dependency matrix
    open-pull-requests-limit: 5

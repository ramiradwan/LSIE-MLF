# LSIE-MLF Docker Compose — §9 Runtime Topology
# Single entry point for all container lifecycle operations.

services:
  # --- Message Broker (§9.1, §9.6 starts first) ---
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - appnetwork
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Persistent Store (§9.1, §9.6 starts after redis) ---
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data/
    networks:
      - appnetwork
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      redis:
        condition: service_healthy

  # --- Capture Container (§9.1, §9.4, §9.6 starts after redis) ---
  stream_scrcpy:
    build:
      context: .
      dockerfile: services/stream_ingest/Dockerfile
    container_name: stream_scrcpy
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - ipc-share:/tmp/ipc/
    networks:
      - appnetwork
    restart: "on-failure:3"
    depends_on:
      redis:
        condition: service_healthy

  # --- ML Worker (§9.1, §9.3, §9.6 starts after redis, postgres, stream_scrcpy) ---
  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: worker
    env_file: .env
    volumes:
      - ipc-share:/tmp/ipc/
      - data-raw:/data/raw/
      - data-interim:/data/interim/
      - data-processed:/data/processed/
    networks:
      - appnetwork
    restart: "on-failure:5"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      stream_scrcpy:
        condition: service_started

  # --- API Server (§9.1, §9.6 starts after worker and postgres) ---
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - data-processed:/data/processed/
    networks:
      - appnetwork
    restart: unless-stopped
    depends_on:
      worker:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  # §9.2 Volume mounts
  ipc-share:
  data-raw:
  data-interim:
  data-processed:
  pg-data:

networks:
  # §9.5 Network configuration
  appnetwork:
    driver: bridge

# LSIE-MLF Docker Compose — §9 Runtime Topology
# Single entry point for all container lifecycle operations.

services:
  # --- Message Broker (§9.1, §9.6 starts first) ---
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - appnetwork
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Persistent Store (§9.1, §9.6 starts after redis) ---
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data/
      # Gap 3 + Gap 4 — Schema DDL and experiment seed data executed on first startup.
      # PostgreSQL runs .sql files in /docker-entrypoint-initdb.d/ in alphabetical order
      # only when the data directory is empty (first initialization).
      - ./data/sql/:/docker-entrypoint-initdb.d/:ro
    networks:
      - appnetwork
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      redis:
        condition: service_healthy

  # --- Capture Container (§9.1, §9.4, §9.6 starts after redis) ---
  stream_scrcpy:
    build:
      context: .
      dockerfile: services/stream_ingest/Dockerfile
    container_name: stream_scrcpy
    privileged: true  
    devices:  
      - /dev/bus/usb:/dev/bus/usb  
    environment:
      - ADB=/usr/bin/adb
      - ADB_SERVER_SOCKET=tcp:host.docker.internal:5037 
      - SCRCPY_SERVER_PATH=/usr/local/share/scrcpy/scrcpy-server
      - SCRCPY_ICON_PATH=/usr/local/share/scrcpy/icon.png
      - XDG_RUNTIME_DIR=/tmp                 # FIX: Prevent Wayland/Display abort
      - SDL_VIDEODRIVER=dummy                # FIX: Force dummy video driver
      - SDL_RENDER_DRIVER=software
    volumes:
      - ipc-share:/tmp/ipc/
    networks:
      - appnetwork
    restart: "on-failure:3"
    depends_on:
      redis:
        condition: service_healthy

  # --- ML Worker (§9.1, §9.3, §9.6 starts after redis, postgres, stream_scrcpy) ---
  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: worker
    env_file: .env
    environment:
      - ADB_SERVER_SOCKET=tcp:host.docker.internal:5037
      # --- NEW ML CONSTRAINTS ---
      - CELERYD_CONCURRENCY=1           # Force exactly 1 worker process
      - OMP_NUM_THREADS=1               # Prevent CPU thread collisions in PyTorch
      - HF_HOME=/data/interim/hf_cache  # Cache the 3GB Whisper model to disk!
    command: ["/bin/sh", "-c", "python3.11 -m services.worker.health & exec celery -A services.worker.celery_app worker --loglevel=info -I services.worker.tasks.inference --concurrency=1"]
    expose:
      - "8081"
    volumes:
      - ipc-share:/tmp/ipc/
      - data-raw:/data/raw/
      - data-interim:/data/interim/
      - data-processed:/data/processed/
    networks:
      - appnetwork
    restart: "on-failure:5"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      stream_scrcpy:
        condition: service_started

  # --- Orchestrator (§4.C — segment producer, Gap 6 fix) ---
  # Runs the Module C orchestration loop that reads from IPC pipes,
  # processes video frames for AU12, assembles 30-second segments,
  # and dispatches them as Celery tasks to the worker.
  # Uses the same image as the worker but with a different CMD.
  orchestrator:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: orchestrator
    env_file: .env
    environment:
      - ADB_SERVER_SOCKET=tcp:host.docker.internal:5037 
    volumes:
      - ipc-share:/tmp/ipc/
      - data-raw:/data/raw/
      - data-interim:/data/interim/
      - data-processed:/data/processed/
    networks:
      - appnetwork
    restart: "on-failure:5"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      stream_scrcpy:
        condition: service_started
    # Gap 6 — Start the orchestrator loop instead of the Celery consumer.
    # This process produces Celery tasks; the worker service consumes them.
    command: ["python3.11", "-m", "services.worker.run_orchestrator"]

  # --- API Server (§9.1, §9.6 starts after redis, worker, and postgres) ---
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - data-processed:/data/processed/
    networks:
      - appnetwork
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  # §9.2 Volume mounts
  ipc-share:
  data-raw:
  data-interim:
  data-processed:
  pg-data:

networks:
  # §9.5 Network configuration
  appnetwork:
    driver: bridge
